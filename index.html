<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte Karting France</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([46.6,2.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png').addTo(map);

let markers = [];

// 🔥 DEBUG JSON
async function chargerLieux(){
  try {
    const res = await fetch('lieux.json');

    console.log("STATUS FETCH :", res.status);

    if(!res.ok){
      throw new Error("Erreur chargement JSON");
    }

    const data = await res.json();
    console.log("DATA JSON :", data);

    return data;

  } catch(e){
    console.error("ERREUR JSON :", e);
    alert("Erreur chargement lieux.json (voir console)");
    return [];
  }
}

// affichage
async function afficherLieux(){

  const lieux = await chargerLieux();

  console.log("NB LIEUX :", lieux.length);

  lieux.forEach(l=>{
    const lat = parseFloat(l.Latitude);
    const lng = parseFloat(l.Longitude);

    console.log("POINT :", lat, lng);

    if(isNaN(lat) || isNaN(lng)) return;

    const m = L.marker([lat,lng]).addTo(map);
    markers.push(m);
  });

}

afficherLieux();

</script>

</body>
</html>
