<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte Karting France</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.search-container {
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:350px;
  z-index:1000;
}

#searchBox {
  width:100%;
  padding:14px;
  border-radius:25px;
  border:none;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

#suggestions {
  margin-top:8px;
  background:white;
  border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
  max-height:200px;
  overflow:auto;
}

.suggestion {
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

#voirAutour {
  position:absolute;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:#0096ff;
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:25px;
  cursor:pointer;
  display:none;
  z-index:2000;
}
</style>
</head>

<body>

<div class="search-container">
  <input type="text" id="searchBox" placeholder="Rechercher un karting ou une ville...">
  <div id="suggestions"></div>
</div>

<button id="voirAutour">👁️ Voir autour</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 📱 mobile
const isMobile = window.innerWidth < 768;
const initialZoom = isMobile ? 6 : 7;

// carte
const map = L.map('map').setView([46.6,2.5], initialZoom);

// fond FR
L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png').addTo(map);

// icône kart
function getKartIcon(color){
  return L.divIcon({
    html:`<div style="background:${color};border-radius:50%;padding:6px;">
      <img src="./kart.png" style="width:26px;">
    </div>`,
    className:'',
    iconSize:[40,40],
    iconAnchor:[20,40]
  });
}

let markers = [];
let halo = null;
let selectedMarker = null;

// reset
function resetView(){
  markers.forEach(m=>{
    m.setOpacity(1);
    if(m._icon) m._icon.style.transform="scale(1)";
  });

  if(halo){
    map.removeLayer(halo);
    halo = null;
  }

  selectedMarker = null;
  document.getElementById("voirAutour").style.display = "none";

  map.setView([46.6,2.5], initialZoom);
}

// JSON
async function chargerLieux(){
  const res = await fetch('lieux.json');
  return await res.json();
}

// affichage
async function afficherLieux(){
  const lieux = await chargerLieux();

  lieux.forEach(l=>{
    const lat = parseFloat(l.Latitude);
    const lng = parseFloat(l.Longitude);
    if(isNaN(lat) || isNaN(lng)) return;

    const nom = (l.Nom || "").trim();
    const ville = (l.Ville || "").trim();
    const color = (l.Couleur || "#ffffff").trim();

    const m = L.marker([lat,lng],{
      icon:getKartIcon(color)
    }).addTo(map);

    m.bindTooltip(`<b>${nom}</b><br>${ville}`);

    m.nom = nom.toLowerCase();
    m.ville = ville.toLowerCase();

    markers.push(m);
  });
}

// recherche
const searchBox = document.getElementById("searchBox");
const suggestionsBox = document.getElementById("suggestions");

searchBox.addEventListener("input", function(){

  const search = this.value.toLowerCase().trim();
  suggestionsBox.innerHTML = "";

  if(search.length === 0){
    resetView();
    return;
  }

  if(search.length < 2) return;

  const results = markers.filter(m =>
    m.nom.includes(search) || m.ville.includes(search)
  );

  results.slice(0,5).forEach(m=>{
    const div = document.createElement("div");
    div.className="suggestion";
    div.innerHTML = `<b>${m.nom}</b><br><small>${m.ville}</small>`;

    div.onclick = () => {

      resetView();
      selectedMarker = m;

      map.setView(m.getLatLng(), isMobile ? 8 : 9);

      markers.forEach(x=>{
        if(x !== m) x.setOpacity(0.4);
      });

      halo = L.circle(m.getLatLng(),{
        radius:6000,
        color:"#0096ff",
        fillOpacity:0.1
      }).addTo(map);

      document.getElementById("voirAutour").style.display = "block";

      suggestionsBox.innerHTML = "";
      searchBox.value = m.nom;
    };

    suggestionsBox.appendChild(div);
  });

});

// voir autour
document.getElementById("voirAutour").onclick = function(){

  if(!selectedMarker) return;

  map.setView(selectedMarker.getLatLng(), isMobile ? 7 : 8);

  markers.forEach(m=>{
    if(m === selectedMarker){
      m.setOpacity(1);
      if(m._icon) m._icon.style.transform = "scale(1.2)";
    } else {
      m.setOpacity(0.6);
      if(m._icon) m._icon.style.transform = "scale(1)";
    }
  });
};

// init
afficherLieux();

</script>

</body>
</html>
